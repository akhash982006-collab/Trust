kind = "web"
previewPath = "/"
title = "TrustLayer"
version = "1.0.0"
id = "artifacts/trustlayer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20124

[services.development]
run = "pnpm --filter @workspace/trustlayer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trustlayer", "run", "build" ]
publicDir = "artifacts/trustlayer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20124"
BASE_PATH = "/"
